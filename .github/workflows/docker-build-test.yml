name: Build and Push Docker Images (test)

on:
  workflow_dispatch:

permissions:
  contents: read

env:
  REGISTRY: docker.io
  APP_IMAGE: tiritibambix/guivcard

jobs:
  setup:
    permissions:
      contents: read
    runs-on: ubuntu-24.04
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Extract version from Git
        id: version
        run: echo "version=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

  audit:
    permissions:
      contents: read
    runs-on: ubuntu-24.04
    needs: setup
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check Python dependencies with pip-audit
        run: |
          docker run --rm -v $(pwd)/app:/app -w /app python:3.11-slim sh -c " \
          python -m venv venv && \
          . venv/bin/activate && \
          pip install --upgrade pip setuptools && \
          pip install pip-audit && \
          pip-audit -r requirements.txt"

  build-and-push:
    permissions:
      contents: read
    runs-on: ubuntu-24.04
    needs: [setup, audit]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image (test tag, amd64 only)
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64
          tags: ${{ env.REGISTRY }}/${{ env.APP_IMAGE }}:test
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false
