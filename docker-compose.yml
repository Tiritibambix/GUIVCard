services:
  app:
    image: tiritibambix/guivcard:latest
    ports:
      - "8190:5000"
    environment:
      # Clé secrète Flask — générer avec : python3 -c "import secrets; print(secrets.token_hex(32))"
      - SECRET_KEY=${SECRET_KEY}
      # URL CardDAV. Utiliser {username} comme placeholder pour le multi-utilisateurs :
      #   http://radicale:5232/{username}/contacts/
      # Ou une collection fixe (mono-utilisateur) :
      #   http://radicale:5232/admin/contacts/
      - CARDDAV_URL=${CARDDAV_URL}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/login"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

# Configuration (.env) :
#   SECRET_KEY=<valeur générée>
#   CARDDAV_URL=http://radicale:5232/{username}/contacts/
